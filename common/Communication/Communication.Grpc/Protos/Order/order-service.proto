syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
option csharp_namespace = "Communication.Grpc.Protos.OrderService";
package orderservice;

service OrderService {
  rpc GetOrders (google.protobuf.Empty) returns (GetOrdersResponse);
  rpc CreateOrder (CreateOrderRequest) returns (OrderItem);
}

message GetOrdersResponse {
  repeated OrderItem orders = 1;
}

message CreateOrderRequest {
  string customer_name = 1;
  string product = 2;
  int32 quantity = 3;
}

message OrderItem {
  int32 id = 1;
  string customer_name = 2;
  string product = 3;
  int32 quantity = 4;
  google.protobuf.Timestamp created_at = 5;
}