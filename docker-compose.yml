services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: microservice/OrderService/OrderService/Dockerfile
    ports:
      - "5201:5201"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=ordersdb;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

  order-api:
    build:
      context: .
      dockerfile: api/OrderApi/Dockerfile
    ports:
      - "5128:8080"
    environment:
      - GrpcServices__OrderService=http://order-service:5201
    depends_on:
      - order-service

volumes:
  postgres_data: