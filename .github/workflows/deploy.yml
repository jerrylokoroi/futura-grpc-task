name: Deploy to Kind Cluster

on:
  push:
    branches:
      - main
      - feature/run-helm-in-workflow
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push images
        run: |
          docker build -t jerrylokoroi/order-api:latest -f api/OrderApi/Dockerfile .
          docker build -t jerrylokoroi/order-service:latest -f microservice/OrderService/OrderService/Dockerfile .
          docker build -t jerrylokoroi/frontend:latest -f frontend/orders-app/Dockerfile ./frontend/orders-app
          docker push jerrylokoroi/order-api:latest
          docker push jerrylokoroi/order-service:latest
          docker push jerrylokoroi/frontend:latest

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create Kind cluster
        run: kind create cluster --name grpc-app --config kind-config.yaml

      - name: Install Nginx Ingress
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          sleep 15
          kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=90s

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Create namespaces
        run: |
          kubectl create namespace customer1
          kubectl create namespace customer2

      - name: Create secrets
        run: |
          kubectl create secret generic db-secret --from-literal=POSTGRES_DB=ordersdb --from-literal=POSTGRES_USER=postgres --from-literal=POSTGRES_PASSWORD=postgres -n customer1
          kubectl create secret generic db-secret --from-literal=POSTGRES_DB=ordersdb --from-literal=POSTGRES_USER=postgres --from-literal=POSTGRES_PASSWORD=postgres -n customer2

      - name: Deploy via Helm
        run: |
          cd helm/order-app
          helm dependency build .
          helm upgrade --install order-app . -f values-customer-1.yaml -n customer1
          helm upgrade --install order-app . -f values-customer-2.yaml -n customer2

      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=ready pod --all -n customer1 --timeout=120s
          kubectl wait --for=condition=ready pod --all -n customer2 --timeout=120s

      - name: Run integration tests
        run: |
          set -e
          echo "Checking pods..."
          kubectl get pods -n customer1
          kubectl get pods -n customer2

          echo "===== CUSTOMER 1 TEST ====="
          kubectl run curl-c1-post --rm -i --restart=Never --image=curlimages/curl --namespace=default -- curl -s -X POST http://order-api.customer1.svc.cluster.local:8080/orders -H "Content-Type: application/json" -d '{"customerName":"Alice","product":"Laptop","quantity":1}' 2>/dev/null || true
          sleep 2
          GET_RESP_1=$(kubectl run curl-c1-get --rm -i --restart=Never --image=curlimages/curl --namespace=default -- curl -s http://order-api.customer1.svc.cluster.local:8080/orders 2>/dev/null)
          echo "Customer1 response: $GET_RESP_1"
          echo "$GET_RESP_1" | grep "Alice" || (echo "FAILED: Alice not found" && exit 1)
          echo "$GET_RESP_1" | grep "Laptop" || (echo "FAILED: Laptop not found" && exit 1)
          echo "Customer1 PASSED"

          echo "===== CUSTOMER 2 TEST ====="
          kubectl run curl-c2-post --rm -i --restart=Never --image=curlimages/curl --namespace=default -- curl -s -X POST http://order-api.customer2.svc.cluster.local:8080/orders -H "Content-Type: application/json" -d '{"customerName":"Bob","product":"Phone","quantity":1}' 2>/dev/null || true
          sleep 2
          GET_RESP_2=$(kubectl run curl-c2-get --rm -i --restart=Never --image=curlimages/curl --namespace=default -- curl -s http://order-api.customer2.svc.cluster.local:8080/orders 2>/dev/null)
          echo "Customer2 response: $GET_RESP_2"
          echo "$GET_RESP_2" | grep "Bob" || (echo "FAILED: Bob not found" && exit 1)
          echo "$GET_RESP_2" | grep "Phone" || (echo "FAILED: Phone not found" && exit 1)
          echo "Customer2 PASSED"

          echo "===== ALL INTEGRATION TESTS PASSED ====="
